<!-- Simple frontend page -->
<html>
  <head>
    <title>My App</title>
  </head>
  <body>
    <h1>Hello from Frontend UI</h1>

    <!-- Button to call backend -->
    <button onclick="callApi()">Call API</button>

    <p id="result"></p>

    <script>
      function callApi() {
        fetch('/api') // calls backend through ingress
          .then(res => res.text())
          .then(data => {
            document.getElementById('result').innerText = data;
          });
      }
    </script>
  </body>
</html>
